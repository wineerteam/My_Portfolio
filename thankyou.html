<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thank you for reaching out. Your message has been successfully sent.">
  <title>Message Sent | Sunil Kumar Yadav</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236c63ff'/><stop offset='1' stop-color='%23a855f7'/></linearGradient></defs><text y='.9em' font-size='80' fill='url(%23g)' font-family='sans-serif' font-weight='900'>S</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --clr-bg: #080812;
      --clr-primary: #6c63ff;
      --clr-accent: #a78bfa;
      --clr-text: #e2e8f0;
      --clr-muted: #94a3b8;
      --grad-primary: linear-gradient(135deg, #6c63ff 0%, #a855f7 100%);
      --grad-text: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 60%, #818cf8 100%);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--clr-bg);
      color: var(--clr-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Premium Texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.08;
      mix-blend-mode: overlay;
    }

    /* Background Auras */
    .aura {
      position: absolute;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      opacity: 0.15;
    }
    .aura-1 { top: -10%; left: -10%; background: var(--clr-primary); }
    .aura-2 { bottom: -10%; right: -10%; background: var(--clr-accent); }

    .container {
      position: relative;
      z-index: 10;
      background: rgba(18, 16, 40, 0.6);
      border: 1px solid rgba(100, 100, 255, 0.15);
      backdrop-filter: blur(20px) saturate(180%);
      padding: 3.5rem 2.5rem;
      border-radius: 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.8s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: rgba(108, 99, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--clr-primary);
      position: relative;
    }

    .success-icon::after {
      content: '';
      position: absolute;
      inset: -10px;
      border: 2px solid var(--clr-primary);
      border-radius: 50%;
      opacity: 0;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes ping {
      75%, 100% { transform: scale(1.6); opacity: 0; }
      0% { transform: scale(1); opacity: 0.6; }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    p {
      color: var(--clr-muted);
      margin-bottom: 2.5rem;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .btn-wrap {
      perspective: 800px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      background: var(--grad-primary);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 12px;
      transition: all var(--transition);
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(108, 99, 255, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 20px 40px rgba(108, 99, 255, 0.45);
    }

    .btn svg {
      transition: transform 0.3s ease;
    }
    .btn:hover svg {
      transform: translateX(-4px);
    }
  </style>
</head>
<body>
  
  <div class="aura aura-1"></div>
  <div class="aura aura-2"></div>

  <div class="container">
    <div class="success-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    </div>
    
    <h1>Message Sent!</h1>
    <p>Thank you for reaching out, Sunil here. I've received your message and will get back to you as soon as possible.</p>
    
    <div class="btn-wrap">
      <a href="index.html" class="btn" id="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Portfolio
      </a>
    </div>
  </div>

  <script>
    (function () {
      // Subtle mouse parallax for the container
      document.addEventListener('mousemove', function(e) {
        var container = document.querySelector('.container');
        if (!container) return;
        var x = (window.innerWidth / 2 - e.pageX) / 50;
        var y = (window.innerHeight / 2 - e.pageY) / 50;
        container.style.transform = 'translate3d(' + x + 'px, ' + y + 'px, 0)';
      });
    })();
  </script>
</body>
</html>
