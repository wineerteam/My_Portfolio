<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Sunil Kumar Yadav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0f0e17;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;}
    .box{max-width:420px;}
    h1{font-size:1.75rem;margin-bottom:1rem;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    p{color:#94a3b8;margin-bottom:1.5rem;line-height:1.6;}
    a{display:inline-block;padding:0.75rem 1.5rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;font-weight:600;border-radius:8px;transition:transform .2s,box-shadow .2s;}
    a:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,.4);}
  </style>
</head>
<body>
  <div class="box">
    <h1>Thank you</h1>
    <p>Your message has been sent. I'll get back to you soon.</p>
    <a href="./" id="back-link">Back to portfolio</a>
  </div>
  <script>
    (function () {
      var link = document.getElementById('back-link');
      if (link) {
        var path = window.location.pathname.replace(/thankyou\.html$/i, '');
        link.href = window.location.origin + (path || '/') + (path && !path.endsWith('/') ? '/' : '');
      }
    })();
  </script>
</body>
</html>
